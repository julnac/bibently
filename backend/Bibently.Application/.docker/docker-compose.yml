services:

  firebase-emulators:
    image: andreysenov/firebase-tools:latest
    ports:
      - "4000:4000" # Emulator UI
      - "8080:8080" # Firestore
      - "9099:9099" # Auth
    volumes:
      - ..:/app # Mount root directory to access firebase.json
    working_dir: /app
    command: sh -c "firebase emulators:start --project demo-no-project --only firestore,auth"
    healthcheck:
      test: [ "CMD", "node", "-e", "const h=require('http');h.get('http://localhost:8080/',r=>process.exit(0)).on('error',()=>process.exit(1))" ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    environment:
      - NODE_ENV=development
    networks:
      - bibently.application-services

  firestore-seed:
    image: mcr.microsoft.com/dotnet/sdk:10.0-alpine
    volumes:
      - ..:/app
    working_dir: /app
    environment:
      - FIRESTORE_EMULATOR_HOST=firebase-emulators:8080
      - FIRESTORE_PROJECT_ID=demo-no-project
    command: >
      sh -c "dotnet run --project tools/Bibently.SeedData -c Release"
    depends_on:
      firebase-emulators:
        condition: service_healthy
    networks:
      - bibently.application-services

  bibently.application:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "5001:8080"
    environment:
      - GOOGLE_CLOUD_PROJECT=demo-no-project
      - FIRESTORE_EMULATOR_HOST=firebase-emulators:8080
      - FIREBASE_AUTH_EMULATOR_HOST=firebase-emulators:9099
      - ASPNETCORE_ENVIRONMENT=Development
      - CORS_ALLOWED_ORIGINS=http://localhost:8081
    depends_on:
      firebase-emulators:
        condition: service_healthy
      firestore-seed:
        condition: service_completed_successfully
    networks:
      - bibently.application-services

networks:
  bibently.application-services:
